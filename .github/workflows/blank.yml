name: Metrics


on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:

  # =============================
  # 👤 PROFILE METRICS
  # =============================
  profile:
    runs-on: ubuntu-latest
    environment:
      name: production
    
    permissions:
      contents: write

    steps:
      - name: Generate profile metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Xyon15
          template: classic
          base: header, activity, community, repositories, metadata

  # =============================
  # 📦 REPOSITORY METRICS
  # =============================
  repository:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write

    steps:
      - name: Generate repository metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          template: repository
          user: Xyon15
          repo: os-assistant
          base: header, activity, community, metadata
